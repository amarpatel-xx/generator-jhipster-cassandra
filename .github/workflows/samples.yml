name: Sample
on: [push, pull_request]
permissions:
  contents: read
jobs:
  generate-sample:
    name: generate-sample
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - name: Generate sample application
        run: |
          mkdir -p "$RUNNER_TEMP/app"
          cd "$RUNNER_TEMP/app"
          node "$GITHUB_WORKSPACE/cli/cli.cjs" generate-sample sample --skip-jhipster-dependencies --skip-install
      - name: Build + test sample backend (skip frontend)
        # ubuntu-latest provides a running Docker daemon, so the *ResourceIT integration
        # tests can start a Cassandra Testcontainer. This runs the unit tests plus the
        # composite-key REST CRUD integration tests against a real Cassandra 5 container.
        working-directory: ${{ runner.temp }}/app
        run: ./mvnw -ntp -Dskip.npm verify
